<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .name  { font-family: Georgia,'Times New Roman',serif; font-size: 78px; font-weight:300; letter-spacing:-3px; fill:#fbfaf5 }
      .tag   { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:13px; fill:#666362; letter-spacing:2.5px }
      .badge { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:11.5px; fill:#d97757; font-weight:600; letter-spacing:0.8px }
    </style>
  </defs>
  <rect width="900" height="280" fill="#1d1d1b"/>
  <!-- Subtle lines -->
  <line x1="0" y1="1" x2="900" y2="1" stroke="#2a2a28" stroke-width="1"/>
  <line x1="0" y1="279" x2="900" y2="279" stroke="#2a2a28" stroke-width="1"/>
  <!-- Decorative dots -->
  <circle cx="840" cy="52" r="2" fill="#d97757" opacity="0.4"/>
  <circle cx="855" cy="52" r="2" fill="#d97757" opacity="0.25"/>
  <circle cx="870" cy="52" r="2" fill="#d97757" opacity="0.12"/>
  <!-- WeTTeA logo -->
  <g transform="translate(800,54) scale(0.42)" opacity="0.7">
    <polyline points="150,140 190,240 240,140 290,240" fill="none" stroke="#d97757" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="300" y1="160" x2="300" y2="240" stroke="#fbfaf5" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  </g>
  <!-- Badge -->
  <rect x="54" y="52" width="170" height="28" rx="14" fill="rgba(217,119,87,0.08)" stroke="#d97757" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="70" cy="66" r="4" fill="#d97757"><animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/></circle>
  <text x="84" y="70.5" class="badge">building in public</text>
  <!-- Name -->
  <text x="52" y="168" class="name">Kuruma</text>
  <!-- Tagline -->
  <text x="56" y="200" class="tag">WEB DEV  ·  SYSTEMS  ·  TOOLS  ·  CONSTANT LEARNING</text>
  <!-- Accent line -->
  <line x1="54" y1="222" x2="220" y2="222" stroke="#d97757" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
</svg>
