<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .mono { font-family: 'Courier New',Courier,monospace }
      .prompt { fill:#d97757; font-size:15px }
      .cmd    { fill:#fbfaf5; font-size:15px }
      .out    { fill:#666362; font-size:13px }
      .dim    { fill:#3a3a38; font-size:13px }
    </style>
  </defs>
  <!-- Window -->
  <rect width="900" height="280" rx="10" fill="#1d1d1b"/>
  <!-- Title bar -->
  <rect width="900" height="42" rx="10" fill="#252523"/>
  <rect y="32" width="900" height="10" fill="#252523"/>
  <!-- Traffic lights -->
  <circle cx="28" cy="21" r="7" fill="#ff5f57"/>
  <circle cx="50" cy="21" r="7" fill="#febc2e"/>
  <circle cx="72" cy="21" r="7" fill="#28c840"/>
  <!-- Title -->
  <text x="450" y="25" class="mono" fill="#666362" font-size="13" text-anchor="middle">kuruma — bash — 128×32</text>
  <!-- Content -->
  <text x="40" y="84" class="mono prompt">~</text>
  <text x="55" y="84" class="mono" fill="#666362" font-size="15"> $ </text>
  <text x="82" y="84" class="mono cmd">whoami</text>
  <text x="40" y="112" class="mono out">Kuruma — developer, builder, constant learner</text>
  <text x="40" y="146" class="mono prompt">~</text>
  <text x="55" y="146" class="mono" fill="#666362" font-size="15"> $ </text>
  <text x="82" y="146" class="mono cmd">cat stack.txt</text>
  <text x="40" y="174" class="mono dim"># languages</text>
  <text x="40" y="196" class="mono out">Java · Rust · Python · JS · Go · TypeScript · SQL · Bash</text>
  <text x="40" y="222" class="mono prompt">~</text>
  <text x="55" y="222" class="mono" fill="#666362" font-size="15"> $ </text>
  <text x="82" y="222" class="mono cmd">_</text>
  <rect x="82" y="208" width="10" height="18" fill="#d97757"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
</svg>
